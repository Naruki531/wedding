.hero-overlay{position:absolute;inset:0;background:linear-gradient(to bottom, rgba(0,0,0,.05) 0%, rgba(0,0,0,.0) 40%, rgba(20,12,8,.65) 100%);}
.hero-text{position:relative;z-index:2;text-align:center;padding:0 1rem 4rem;color:#fff;}
.hero-date{font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:300;font-size:clamp(13px,2vw,16px);letter-spacing:.25em;margin-bottom:1rem;opacity:.85;}
.hero-names{font-family:'Cormorant Garamond',serif;font-weight:300;font-size:clamp(36px,8vw,72px);line-height:1;letter-spacing:.08em;margin-bottom:.75rem;}
.hero-names em{font-style:italic;font-weight:300;}
.hero-amp{font-size:.7em;margin:0 .3em;opacity:.7;}
.hero-tagline{font-size:clamp(11px,1.5vw,13px);letter-spacing:.3em;opacity:.7;font-weight:300;}
.hero-scroll{position:absolute;bottom:2rem;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:6px;color:rgba(255,255,255,.6);font-size:11px;letter-spacing:.2em;z-index:2;animation:bob 2s ease-in-out infinite;}
@keyframes bob{0%,100%{transform:translateX(-50%) translateY(0);}50%{transform:translateX(-50%) translateY(6px);}}
.hero-scroll::after{content:'';display:block;width:1px;height:30px;background:rgba(255,255,255,.4);}

/* ── NAV ── */
nav{background:var(--warm-white);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:.75rem 1.5rem;}
.nav-logo{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:18px;color:var(--text-mid);letter-spacing:.05em;}
.nav-tabs{display:flex;gap:4px;}
.nav-tab{background:none;border:none;font-family:'Noto Serif JP',serif;font-size:12px;color:var(--text-light);padding:.4rem .9rem;border-radius:20px;cursor:pointer;letter-spacing:.05em;transition:all .2s;}
.nav-tab:hover{color:var(--text-dark);}
.nav-tab.active{background:var(--gold-light);color:var(--text-dark);}

/* ── MAIN ── */
main{max-width:900px;margin:0 auto;padding:2.5rem 1.25rem 4rem;}


/* ── SECTION TITLE ── */
.sec{margin-bottom:2rem;}
.sec-title{font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:300;font-size:22px;color:var(--text-mid);margin-bottom:1rem;display:flex;align-items:center;gap:.75rem;}
.sec-title::after{content:'';flex:1;height:1px;background:var(--border);}

/* ── CATEGORIES ── */
.cats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1.5rem;}
@media(max-width:500px){.cats{grid-template-columns:1fr;}}
.cat-btn{background:var(--warm-white);border:1px solid var(--border);border-radius:10px;padding:1rem .75rem .85rem;cursor:pointer;font-family:'Noto Serif JP',serif;font-size:13px;color:var(--text-dark);text-align:center;display:flex;flex-direction:column;align-items:center;gap:5px;transition:all .2s;}
.cat-btn:hover{border-color:var(--gold-light);}
.cat-btn.active{border:2px solid var(--gold);background:#fffaf3;color:var(--text-dark);}
.cat-em{font-size:20px;}
.cat-lbl{font-weight:400;font-size:14px;}
.cat-sub{font-size:10px;color:var(--text-light);}
.cat-cnt{font-size:10px;background:var(--border);border-radius:10px;padding:1px 8px;color:var(--text-mid);}
.cat-btn.active .cat-cnt{background:var(--gold-light);color:var(--text-dark);}

/* ── NAME INPUT ── */
.name-wrap{margin-bottom:1rem;}
.name-wrap label{display:block;font-size:12px;color:var(--text-light);margin-bottom:5px;letter-spacing:.06em;}
.name-wrap input{width:100%;border:1px solid var(--border);border-radius:6px;padding:.5rem .85rem;font-size:14px;font-family:'Noto Serif JP',serif;background:var(--warm-white);color:var(--text-dark);}
.name-wrap input:focus{outline:none;border-color:var(--gold);}

/* ── DROP ZONE ── */
.drop-zone{border:1.5px dashed var(--border);border-radius:12px;padding:2.5rem 1rem;text-align:center;cursor:pointer;background:var(--warm-white);transition:all .2s;}
.drop-zone:hover,.drop-zone.over{border-color:var(--gold);background:#fffaf3;}
.drop-zone input{display:none;}
.drop-icon{font-size:26px;margin-bottom:10px;}
.drop-zone p{font-size:14px;color:var(--text-mid);}
.drop-zone strong{color:var(--text-dark);}
.drop-hint{font-size:11px;color:var(--text-light);margin-top:5px;}

/* ── PREVIEW ── */
.prev-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:8px;margin:.85rem 0;}
.prev-item{position:relative;aspect-ratio:1;border-radius:8px;overflow:hidden;background:var(--border);}
.prev-item img,.prev-item video{width:100%;height:100%;object-fit:cover;display:block;}
.prev-del{position:absolute;top:3px;right:3px;background:rgba(0,0,0,.55);color:#fff;border:none;border-radius:50%;width:18px;height:18px;font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.prev-badge{position:absolute;bottom:3px;left:3px;background:rgba(0,0,0,.5);color:#fff;font-size:9px;padding:1px 5px;border-radius:4px;}

/* ── PROGRESS ── */
.prog-wrap{margin:.75rem 0;display:none;}
.prog-track{background:var(--border);border-radius:4px;height:5px;overflow:hidden;}
.prog-fill{height:100%;background:var(--gold);border-radius:4px;transition:width .3s;}
.prog-txt{font-size:12px;color:var(--text-light);text-align:center;margin-top:5px;}

/* ── STATUS ── */
.status{font-size:13px;text-align:center;padding:.5rem;border-radius:8px;margin-bottom:.75rem;display:none;}
.status.ok{background:#f0f7ea;color:#4a7a2e;display:block;}
.status.err{background:#fdf0f0;color:#9b3333;display:block;}

/* ── UPLOAD BTN ── */
.up-btn-wrap{text-align:center;margin-top:1rem;}
.up-btn{background:var(--gold);color:#fff;border:none;border-radius:8px;padding:.7rem 2.5rem;font-size:15px;font-family:'Noto Serif JP',serif;cursor:pointer;letter-spacing:.08em;transition:background .2s;}
.up-btn:hover{background:#b8945a;}
.up-btn:disabled{opacity:.4;cursor:not-allowed;}

/* ── GALLERY ── */
.gal-filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:.85rem;}
.chip{font-size:12px;padding:3px 14px;border-radius:12px;border:1px solid var(--border);background:var(--warm-white);color:var(--text-light);cursor:pointer;font-family:'Noto Serif JP',serif;transition:all .2s;}
.chip:hover{color:var(--text-dark);}
.chip.active{background:var(--gold-light);border-color:var(--gold);color:var(--text-dark);}
.gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;}
.gal-item{border-radius:10px;overflow:hidden;background:var(--warm-white);border:1px solid var(--border);transition:transform .2s;}
.gal-item:hover{transform:translateY(-3px);}
.gal-img,.gal-vid{width:100%;aspect-ratio:1;object-fit:cover;display:block;cursor:pointer;}
.gal-meta{padding:6px 9px 7px;}
.gal-name{font-size:11px;font-weight:400;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.gal-cat{font-size:10px;color:var(--text-light);}
.gal-empty{text-align:center;padding:3rem;color:var(--text-light);font-size:14px;}

/* ── MODAL ── */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:9999;align-items:center;justify-content:center;}
.modal-bg.open{display:flex;}
.modal-inner{position:relative;}
.modal-inner img,.modal-inner video{max-width:90vw;max-height:88vh;border-radius:8px;display:block;}
.modal-x{position:absolute;top:-14px;right:-14px;background:#fff;color:#333;border:none;border-radius:50%;width:28px;height:28px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;}

/* ── FOOTER ── */
footer{text-align:center;padding:2rem;font-size:12px;color:var(--text-light);border-top:1px solid var(--border);font-family:'Cormorant Garamond',serif;font-style:italic;letter-spacing:.1em;}

/* ── FADE IN ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
.fade-up{animation:fadeUp .8s ease both;}
.fade-up-2{animation:fadeUp .8s .15s ease both;}
.fade-up-3{animation:fadeUp .8s .3s ease both;}
</style>
</head>
<body>

<!-- HERO -->
<section class="hero">
  <div class="hero-img"></div>
  <div class="hero-overlay"></div>
  <div class="hero-text">
    <p class="hero-date fade-up">Our Wedding Day</p>
    <h1 class="hero-names fade-up-2"><em>Groom</em><span class="hero-amp">&amp;</span><em>Bride</em></h1>
    <p class="hero-tagline fade-up-3">思い出の写真・動画をシェアしてください</p>
  </div>
  <div class="hero-scroll">SCROLL</div>
</section>

<!-- NAV -->
<nav>
  <span class="nav-logo">Wedding Memories</span>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="showTab('upload',this)">アップロード</button>
    <button class="nav-tab" onclick="showTab('gallery',this)">ギャラリー</button>
  </div>
</nav>

<main>



  <!-- UPLOAD TAB -->
  <div id="tab-upload">

    <div class="sec">
      <h2 class="sec-title">カテゴリを選ぶ</h2>
      <div class="cats">
        <button class="cat-btn active" data-cat="groom" onclick="selectCat(this)">
          <span class="cat-em">🤵</span><span class="cat-lbl">新郎側</span>
          <span class="cat-sub">友人・親族・上司</span>
          <span class="cat-cnt" id="cnt-groom">0</span>
        </button>
        <button class="cat-btn" data-cat="bride" onclick="selectCat(this)">
          <span class="cat-em">👰</span><span class="cat-lbl">新婦側</span>
          <span class="cat-sub">友人・親族・上司</span>
          <span class="cat-cnt" id="cnt-bride">0</span>
        </button>

      </div>
    </div>

    <div class="sec">
      <h2 class="sec-title">お名前を入力</h2>
      <div class="name-wrap">
        <label>お名前（任意）</label>
        <input type="text" id="uploader-name" placeholder="例：山田 太郎" />
      </div>
    </div>

    <div class="sec">
      <h2 class="sec-title">写真・動画を選ぶ</h2>
      <div class="drop-zone" id="drop-zone"
        onclick="document.getElementById('file-in').click()"
        ondragover="doDragOver(event)" ondragleave="doDragLeave()" ondrop="doDrop(event)">
        <input type="file" id="file-in" multiple accept="image/*,video/*" onchange="handleFiles(this.files)" />
        <div class="drop-icon">📷</div>
        <p><strong>クリックまたはドラッグ＆ドロップ</strong></p>
        <p class="drop-hint">JPEG / PNG / GIF / MP4 / MOV など ・ 複数同時OK</p>
      </div>
      <div id="prev-grid" class="prev-grid"></div>
      <div class="prog-wrap" id="prog-wrap">
        <div class="prog-track"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
        <div class="prog-txt" id="prog-txt">アップロード中...</div>
      </div>
      <div class="status" id="status"></div>
      <div class="up-btn-wrap">
        <button class="up-btn" id="up-btn" onclick="uploadAll()" disabled>アップロードする</button>
      </div>
    </div>

  </div><!-- /upload tab -->

  <!-- GALLERY TAB -->
  <div id="tab-gallery" style="display:none;">
    <div class="sec">
      <h2 class="sec-title">ギャラリー</h2>
      <div class="gal-filters">
        <button class="chip active" data-f="all" onclick="filterGal(this)">すべて</button>
        <button class="chip" data-f="groom" onclick="filterGal(this)">新郎側</button>
        <button class="chip" data-f="bride" onclick="filterGal(this)">新婦側</button>
      </div>
      <div id="gallery" class="gallery"></div>
      <div id="gal-empty" class="gal-empty">まだ写真・動画がありません 📷<br>最初の思い出をシェアしてください！</div>
    </div>
  </div>

</main>

<footer>With Love &amp; Gratitude — Thank you for celebrating with us</footer>

<!-- MODAL -->
<div class="modal-bg" id="modal" onclick="closeModal()">
  <div class="modal-inner" onclick="event.stopPropagation()">
    <button class="modal-x" onclick="closeModal()">✕</button>
    <div id="modal-cnt"></div>
  </div>
</div>

<script>
const CAT={groom:'新郎側',bride:'新婦側'};
let selCat='groom',pending=[],items=JSON.parse(localStorage.getItem('wp_items')||'[]'),cfg={cloud:'dfhl0qxju',preset:'NARUKIHARUNAWD'};


function showTab(tab,btn){
  document.getElementById('tab-upload').style.display=tab==='upload'?'block':'none';
  document.getElementById('tab-gallery').style.display=tab==='gallery'?'block':'none';
  document.querySelectorAll('.nav-tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  if(tab==='gallery')renderGal();
}

function selectCat(btn){document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');selCat=btn.dataset.cat;}
function doDragOver(e){e.preventDefault();document.getElementById('drop-zone').classList.add('over');}
function doDragLeave(){document.getElementById('drop-zone').classList.remove('over');}
function doDrop(e){e.preventDefault();doDragLeave();handleFiles(e.dataTransfer.files);}

function handleFiles(files){[...files].forEach(f=>{pending.push(f);addPreview(f,pending.length-1);});document.getElementById('up-btn').disabled=pending.filter(Boolean).length===0;}

function addPreview(file,idx){const g=document.getElementById('prev-grid');const d=document.createElement('div');d.className='prev-item';d.id='pv'+idx;const url=URL.createObjectURL(file);const isV=file.type.startsWith('video/');d.innerHTML=(isV?`<video src="${url}" muted></video>`:`<img src="${url}"/>`)+'<button class="prev-del" onclick="removePending('+idx+')">✕</button><span class="prev-badge">'+(isV?'動画':'写真')+'</span>';g.appendChild(d);}
function removePending(idx){pending[idx]=null;const el=document.getElementById('pv'+idx);if(el)el.remove();document.getElementById('up-btn').disabled=pending.filter(Boolean).length===0;}

function setStatus(msg,type){const el=document.getElementById('status');el.className='status '+type;el.textContent=msg;}

async function uploadAll(){
  const files=pending.filter(Boolean);
  if(!files.length)return;
  if(!cfg.cloud||!cfg.preset){setStatus('⚠️ Cloud Name と Upload Preset を設定してください。','err');return;}
  const btn=document.getElementById('up-btn');btn.disabled=true;
  document.getElementById('prog-wrap').style.display='block';
  const name=document.getElementById('uploader-name').value.trim()||'匿名';
  let done=0;
  for(const file of files){
    const fd=new FormData();fd.append('file',file);fd.append('upload_preset',cfg.preset);fd.append('folder','wedding/'+selCat);fd.append('context','uploader='+name+'|category='+selCat);
    try{const isV=file.type.startsWith('video/');const r=await fetch('https://api.cloudinary.com/v1_1/'+cfg.cloud+'/'+(isV?'video':'image')+'/upload',{method:'POST',body:fd});const d=await r.json();if(d.secure_url){items.push({url:d.secure_url,type:isV?'video':'image',cat:selCat,name,id:d.public_id});localStorage.setItem('wp_items',JSON.stringify(items));updateCnt(selCat);}}catch(e){}
    done++;document.getElementById('prog-fill').style.width=Math.round(done/files.length*100)+'%';document.getElementById('prog-txt').textContent=done+' / '+files.length+' 完了';
  }
  pending=[];document.getElementById('prev-grid').innerHTML='';document.getElementById('prog-wrap').style.display='none';btn.disabled=true;
  setStatus('アップロード完了！ありがとうございました 🎉','ok');
  setTimeout(()=>document.getElementById('status').style.display='none',4000);
}

function updateCnt(cat){const n=items.filter(i=>i.cat===cat).length;const el=document.getElementById('cnt-'+cat);if(el)el.textContent=n;}
let galFilter='all';
function filterGal(btn){document.querySelectorAll('.chip').forEach(b=>b.classList.remove('active'));btn.classList.add('active');galFilter=btn.dataset.f;renderGal();}
function renderGal(){const list=galFilter==='all'?items:items.filter(i=>i.cat===galFilter);const g=document.getElementById('gallery');const e=document.getElementById('gal-empty');g.innerHTML='';if(!list.length){e.style.display='block';return;}e.style.display='none';[...list].reverse().forEach(item=>{const d=document.createElement('div');d.className='gal-item';d.innerHTML=(item.type==='video'?'<video class="gal-vid" src="'+item.url+'" muted onclick="openM(''+item.url+'','video')"></video>':'<img class="gal-img" src="'+item.url+'" loading="lazy" onclick="openM(''+item.url+'','image')" />')+'<div class="gal-meta"><div class="gal-name">'+item.name+'</div><div class="gal-cat">'+( CAT[item.cat]||item.cat)+'</div></div>';g.appendChild(d);});}
function openM(url,type){document.getElementById('modal-cnt').innerHTML=type==='video'?'<video src="'+url+'" controls autoplay style="max-width:85vw;max-height:85vh;border-radius:8px;"></video>':'<img src="'+url+'" style="max-width:88vw;max-height:88vh;border-radius:8px;" />';document.getElementById('modal').classList.add('open');}
function closeModal(){document.getElementById('modal').classList.remove('open');document.getElementById('modal-cnt').innerHTML='';}

Object.keys(CAT).forEach(updateCnt);renderGal();
</script>
</body>
</html>
