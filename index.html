<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Wedding Photo Share</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Noto+Serif+JP:wght@300;400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --ivory:#faf8f4;
  --warm:#fffdf9;
  --gold:#c9a96e;
  --gold-l:#e8d5b0;
  --dark:#2c2420;
  --mid:#6b5c52;
  --light:#a89080;
  --border:#e8e0d6;
}
body{background:var(--ivory);color:var(--dark);font-family:'Noto Serif JP',serif;}

/* HERO */
.hero{position:relative;width:100%;height:100vh;min-height:560px;overflow:hidden;display:flex;align-items:flex-end;justify-content:center;}
.hero-img{position:absolute;inset:0;background-size:cover;background-position:center 30%;width:100%;height:100%;}
.hero-ov{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,.04) 0%,rgba(0,0,0,0) 40%,rgba(20,12,8,.62) 100%);}
.hero-txt{position:relative;z-index:2;text-align:center;padding:0 1rem 4rem;color:#fff;}
.hero-date{font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:300;font-size:clamp(13px,2vw,16px);letter-spacing:.25em;margin-bottom:1rem;opacity:.85;}
.hero-names{font-family:'Cormorant Garamond',serif;font-weight:300;font-size:clamp(34px,8vw,70px);line-height:1;letter-spacing:.08em;margin-bottom:.75rem;}
.hero-names em{font-style:italic;}
.hero-amp{font-size:.7em;margin:0 .3em;opacity:.7;}
.hero-sub{font-size:clamp(11px,1.5vw,13px);letter-spacing:.3em;opacity:.7;}
.hero-scroll{position:absolute;bottom:2rem;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:6px;color:rgba(255,255,255,.55);font-size:11px;letter-spacing:.2em;z-index:2;animation:bob 2s ease-in-out infinite;}
@keyframes bob{0%,100%{transform:translateX(-50%) translateY(0);}50%{transform:translateX(-50%) translateY(6px);}}
.hero-scroll::after{content:'';display:block;width:1px;height:28px;background:rgba(255,255,255,.4);}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:translateY(0);}}
.fu1{animation:fadeUp .8s ease both;}
.fu2{animation:fadeUp .8s .15s ease both;}
.fu3{animation:fadeUp .8s .3s ease both;}

/* NAV */
nav{background:var(--warm);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:.7rem 1.5rem;}
.nav-logo{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:18px;color:var(--mid);letter-spacing:.05em;}
.nav-tabs{display:flex;gap:4px;}
.nav-tab{background:none;border:none;font-family:'Noto Serif JP',serif;font-size:12px;color:var(--light);padding:.4rem .9rem;border-radius:20px;cursor:pointer;letter-spacing:.05em;transition:all .2s;}
.nav-tab:hover{color:var(--dark);}
.nav-tab.active{background:var(--gold-l);color:var(--dark);}

/* MAIN */
main{max-width:900px;margin:0 auto;padding:2.5rem 1.25rem 4rem;}

/* SECTION TITLE */
.sec{margin-bottom:2rem;}
.sec-title{font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:300;font-size:22px;color:var(--mid);margin-bottom:1rem;display:flex;align-items:center;gap:.75rem;}
.sec-title::after{content:'';flex:1;height:1px;background:var(--border);}

/* CATEGORIES */
.cats{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:1.5rem;}
.cat-btn{background:var(--warm);border:1px solid var(--border);border-radius:10px;padding:1rem .75rem .85rem;cursor:pointer;font-family:'Noto Serif JP',serif;font-size:13px;color:var(--dark);text-align:center;display:flex;flex-direction:column;align-items:center;gap:5px;transition:all .2s;}
.cat-btn:hover{border-color:var(--gold-l);}
.cat-btn.active{border:2px solid var(--gold);background:#fffaf3;}
.cat-em{font-size:20px;}
.cat-lbl{font-weight:400;font-size:14px;}
.cat-sub{font-size:10px;color:var(--light);}
.cat-cnt{font-size:10px;background:var(--border);border-radius:10px;padding:1px 8px;color:var(--mid);}
.cat-btn.active .cat-cnt{background:var(--gold-l);}

/* NAME */
.name-wrap{margin-bottom:1rem;}
.name-wrap label{display:block;font-size:12px;color:var(--light);margin-bottom:5px;letter-spacing:.06em;}
.name-wrap input{width:100%;border:1px solid var(--border);border-radius:6px;padding:.5rem .85rem;font-size:14px;font-family:'Noto Serif JP',serif;background:var(--warm);color:var(--dark);}
.name-wrap input:focus{outline:none;border-color:var(--gold);}

/* DROP ZONE */
.drop-zone{border:1.5px dashed var(--border);border-radius:12px;padding:2.5rem 1rem;text-align:center;cursor:pointer;background:var(--warm);transition:all .2s;}
.drop-zone:hover,.drop-zone.over{border-color:var(--gold);background:#fffaf3;}
.drop-zone input{display:none;}
.drop-icon{font-size:26px;margin-bottom:10px;}
.drop-zone p{font-size:14px;color:var(--mid);}
.drop-zone strong{color:var(--dark);}
.drop-hint{font-size:11px;color:var(--light);margin-top:5px;}

/* PREVIEW */
.prev-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:8px;margin:.85rem 0;}
.prev-item{position:relative;aspect-ratio:1;border-radius:8px;overflow:hidden;background:var(--border);}
.prev-item img,.prev-item video{width:100%;height:100%;object-fit:cover;display:block;}
.prev-del{position:absolute;top:3px;right:3px;background:rgba(0,0,0,.55);color:#fff;border:none;border-radius:50%;width:18px;height:18px;font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.prev-badge{position:absolute;bottom:3px;left:3px;background:rgba(0,0,0,.5);color:#fff;font-size:9px;padding:1px 5px;border-radius:4px;}

/* PROGRESS */
.prog-wrap{margin:.75rem 0;display:none;}
.prog-track{background:var(--border);border-radius:4px;height:5px;overflow:hidden;}
.prog-fill{height:100%;background:var(--gold);border-radius:4px;transition:width .3s;}
.prog-txt{font-size:12px;color:var(--light);text-align:center;margin-top:5px;}

/* STATUS */
.status{font-size:13px;text-align:center;padding:.5rem;border-radius:8px;margin-bottom:.75rem;display:none;}
.status.ok{background:#f0f7ea;color:#4a7a2e;display:block;}
.status.err{background:#fdf0f0;color:#9b3333;display:block;}

/* UPLOAD BTN */
.up-btn-wrap{text-align:center;margin-top:1rem;}
.up-btn{background:var(--gold);color:#fff;border:none;border-radius:8px;padding:.7rem 2.5rem;font-size:15px;font-family:'Noto Serif JP',serif;cursor:pointer;letter-spacing:.08em;transition:background .2s;}
.up-btn:hover{background:#b8945a;}
.up-btn:disabled{opacity:.4;cursor:not-allowed;}

/* GALLERY */
.gal-filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:.85rem;}
.chip{font-size:12px;padding:3px 14px;border-radius:12px;border:1px solid var(--border);background:var(--warm);color:var(--light);cursor:pointer;font-family:'Noto Serif JP',serif;transition:all .2s;}
.chip:hover{color:var(--dark);}
.chip.active{background:var(--gold-l);border-color:var(--gold);color:var(--dark);}
.gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;}
.gal-item{border-radius:10px;overflow:hidden;background:var(--warm);border:1px solid var(--border);transition:transform .2s;}
.gal-item:hover{transform:translateY(-3px);}
.gal-img,.gal-vid{width:100%;aspect-ratio:1;object-fit:cover;display:block;cursor:pointer;}
.gal-meta{padding:6px 9px 7px;}
.gal-name{font-size:11px;font-weight:400;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.gal-cat{font-size:10px;color:var(--light);}
.gal-empty{text-align:center;padding:3rem;color:var(--light);font-size:14px;}
.gal-loading{text-align:center;padding:2rem;color:var(--light);font-size:13px;}

/* MODAL */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:9999;align-items:center;justify-content:center;}
.modal-bg.open{display:flex;}
.modal-inner{position:relative;}
.modal-inner img,.modal-inner video{max-width:90vw;max-height:88vh;border-radius:8px;display:block;}
.modal-x{position:absolute;top:-14px;right:-14px;background:#fff;color:#333;border:none;border-radius:50%;width:28px;height:28px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;}

/* FOOTER */
footer{text-align:center;padding:2rem;font-size:12px;color:var(--light);border-top:1px solid var(--border);font-family:'Cormorant Garamond',serif;font-style:italic;letter-spacing:.1em;}
</style>
</head>
<body>

<section class="hero">
  <div class="hero-img" id="hero-img"></div>
  <div class="hero-ov"></div>
  <div class="hero-txt">
    <p class="hero-date fu1">Our Wedding Day</p>
    <h1 class="hero-names fu2"><em>Naruki</em><span class="hero-amp">&amp;</span><em>Haruna</em></h1>
    <p class="hero-sub fu3">思い出の写真・動画をシェアしてください</p>
  </div>
  <div class="hero-scroll">SCROLL</div>
</section>

<nav>
  <span class="nav-logo">Wedding Memories</span>
  <div class="nav-tabs">
    <button class="nav-tab active" id="tab-btn-upload" onclick="showTab('upload',this)">アップロード</button>
    <button class="nav-tab" id="tab-btn-gallery" onclick="showTab('gallery',this)">ギャラリー</button>
  </div>
</nav>

<main>
  <div id="tab-upload">
    <div class="sec">
      <h2 class="sec-title">カテゴリを選ぶ</h2>
      <div class="cats">
        <button class="cat-btn active" data-cat="groom" onclick="selectCat(this)">
          <span class="cat-em">🤵</span>
          <span class="cat-lbl">新郎側</span>
          <span class="cat-sub">友人・親族・上司</span>
          <span class="cat-cnt" id="cnt-groom">-</span>
        </button>
        <button class="cat-btn" data-cat="bride" onclick="selectCat(this)">
          <span class="cat-em">👰</span>
          <span class="cat-lbl">新婦側</span>
          <span class="cat-sub">友人・親族・上司</span>
          <span class="cat-cnt" id="cnt-bride">-</span>
        </button>
      </div>
    </div>

    <div class="sec">
      <h2 class="sec-title">お名前を入力</h2>
      <div class="name-wrap">
        <label>お名前（任意）</label>
        <input type="text" id="uploader-name" placeholder="例：山田 太郎"/>
      </div>
    </div>

    <div class="sec">
      <h2 class="sec-title">写真・動画を選ぶ</h2>
      <div class="drop-zone" id="drop-zone"
        onclick="document.getElementById('file-in').click()"
        ondragover="doDragOver(event)"
        ondragleave="doDragLeave()"
        ondrop="doDrop(event)">
        <input type="file" id="file-in" multiple accept="image/*,video/*" onchange="handleFiles(this.files)"/>
        <div class="drop-icon">📷</div>
        <p><strong>クリックまたはドラッグ＆ドロップ</strong></p>
        <p class="drop-hint">JPEG / PNG / GIF / MP4 / MOV など ・ 複数同時OK</p>
      </div>
      <div id="prev-grid" class="prev-grid"></div>
      <div class="prog-wrap" id="prog-wrap">
        <div class="prog-track"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
        <div class="prog-txt" id="prog-txt">アップロード中...</div>
      </div>
      <div class="status" id="status"></div>
      <div class="up-btn-wrap">
        <button class="up-btn" id="up-btn" onclick="uploadAll()" disabled>アップロードする</button>
      </div>
    </div>
  </div>

  <div id="tab-gallery" style="display:none;">
    <div class="sec">
      <h2 class="sec-title">ギャラリー</h2>
      <div class="gal-filters">
        <button class="chip active" data-f="all" onclick="filterGal(this)">すべて</button>
        <button class="chip" data-f="groom" onclick="filterGal(this)">新郎側</button>
        <button class="chip" data-f="bride" onclick="filterGal(this)">新婦側</button>
      </div>
      <div id="gal-loading" class="gal-loading">読み込み中...</div>
      <div id="gallery" class="gallery"></div>
      <div id="gal-empty" class="gal-empty" style="display:none;">まだ写真・動画がありません 📷<br>最初の思い出をシェアしてください！</div>
    </div>
  </div>
</main>

<footer>With Love &amp; Gratitude — Thank you for celebrating with us</footer>

<div class="modal-bg" id="modal" onclick="closeModal()">
  <div class="modal-inner" onclick="event.stopPropagation()">
    <button class="modal-x" onclick="closeModal()">✕</button>
    <div id="modal-cnt"></div>
  </div>
</div>

// Listen to Firestore in realtime
var q = query(collection(db, 'photos'), orderBy('createdAt', 'desc'));
onSnapshot(q, function(snapshot) {
  allItems = [];
  snapshot.forEach(function(doc) {
    allItems.push(doc.data());
  });
  updateAllCounts();
  renderGal();
  document.getElementById('gal-loading').style.display = 'none';
});

window.showTab = function(tab, btn) {
  document.getElementById('tab-upload').style.display = (tab === 'upload') ? 'block' : 'none';
  document.getElementById('tab-gallery').style.display = (tab === 'gallery') ? 'block' : 'none';
  document.querySelectorAll('.nav-tab').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
};

window.selectCat = function(btn) {
  document.querySelectorAll('.cat-btn').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
  selCat = btn.getAttribute('data-cat');
};

window.doDragOver = function(e) { e.preventDefault(); document.getElementById('drop-zone').classList.add('over'); };
window.doDragLeave = function() { document.getElementById('drop-zone').classList.remove('over'); };
window.doDrop = function(e) { e.preventDefault(); window.doDragLeave(); window.handleFiles(e.dataTransfer.files); };

window.handleFiles = function(files) {
  Array.from(files).forEach(function(f) {
    pending.push(f);
    addPreview(f, pending.length - 1);
  });
  document.getElementById('up-btn').disabled = (pending.filter(Boolean).length === 0);
};

function addPreview(file, idx) {
  var g = document.getElementById('prev-grid');
  var d = document.createElement('div');
  d.className = 'prev-item';
  d.id = 'pv' + idx;
  var url = URL.createObjectURL(file);
  var isV = file.type.startsWith('video/');
  var media = document.createElement(isV ? 'video' : 'img');
  media.src = url;
  media.style.cssText = 'width:100%;height:100%;object-fit:cover;display:block;';
  if (isV) { media.muted = true; }
  var delBtn = document.createElement('button');
  delBtn.className = 'prev-del';
  delBtn.textContent = '✕';
  delBtn.onclick = (function(i) { return function(e) { e.stopPropagation(); window.removePending(i); }; })(idx);
  var badge = document.createElement('span');
  badge.className = 'prev-badge';
  badge.textContent = isV ? '動画' : '写真';
  d.appendChild(media);
  d.appendChild(delBtn);
  d.appendChild(badge);
  g.appendChild(d);
}

window.removePending = function(idx) {
  pending[idx] = null;
  var el = document.getElementById('pv' + idx);
  if (el) el.remove();
  document.getElementById('up-btn').disabled = (pending.filter(Boolean).length === 0);
};

function setStatus(msg, type) {
  var el = document.getElementById('status');
  el.className = 'status ' + type;
  el.textContent = msg;
}

window.uploadAll = async function() {
  var files = pending.filter(Boolean);
  if (!files.length) return;
  var btn = document.getElementById('up-btn');
  btn.disabled = true;
  document.getElementById('prog-wrap').style.display = 'block';
  var name = document.getElementById('uploader-name').value.trim() || '匿名';
  var done = 0;
  for (var i = 0; i < files.length; i++) {
    var file = files[i];
    var isV = file.type.startsWith('video/');
    var fd = new FormData();
    fd.append('file', file);
    fd.append('upload_preset', PRESET);
    fd.append('folder', 'wedding/' + selCat);
    try {
      var endpoint = 'https://api.cloudinary.com/v1_1/' + CLOUD + '/' + (isV ? 'video' : 'image') + '/upload';
      var r = await fetch(endpoint, {method: 'POST', body: fd});
      var data = await r.json();
      if (data.secure_url) {
        await addDoc(collection(db, 'photos'), {
          url: data.secure_url,
          type: isV ? 'video' : 'image',
          cat: selCat,
          name: name,
          publicId: data.public_id,
          createdAt: Date.now()
        });
      }
    } catch(e) { console.error(e); }
    done++;
    document.getElementById('prog-fill').style.width = Math.round(done / files.length * 100) + '%';
    document.getElementById('prog-txt').textContent = done + ' / ' + files.length + ' 完了';
  }
  pending = [];
  document.getElementById('prev-grid').innerHTML = '';
  document.getElementById('prog-wrap').style.display = 'none';
  btn.disabled = true;
  setStatus('アップロード完了！ありがとうございました 🎉', 'ok');
  setTimeout(function() { document.getElementById('status').style.display = 'none'; }, 4000);
};

function updateAllCounts() {
  Object.keys(CAT).forEach(function(cat) {
    var n = allItems.filter(function(i) { return i.cat === cat; }).length;
    var el = document.getElementById('cnt-' + cat);
    if (el) el.textContent = n;
  });
}

window.filterGal = function(btn) {
  document.querySelectorAll('.chip').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
  galFilter = btn.getAttribute('data-f');
  renderGal();
};

function renderGal() {
  var list = (galFilter === 'all') ? allItems : allItems.filter(function(i) { return i.cat === galFilter; });
  var g = document.getElementById('gallery');
  var empty = document.getElementById('gal-empty');
  g.innerHTML = '';
  if (!list.length) {
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';
  list.forEach(function(item) {
    var d = document.createElement('div');
    d.className = 'gal-item';
    var media;
    if (item.type === 'video') {
      media = document.createElement('video');
      media.className = 'gal-vid';
      media.src = item.url;
      media.muted = true;
    } else {
      media = document.createElement('img');
      media.className = 'gal-img';
      media.src = item.url;
      media.loading = 'lazy';
    }
    media.addEventListener('click', (function(u, t) {
      return function() { window.openM(u, t); };
    })(item.url, item.type));
    var meta = document.createElement('div');
    meta.className = 'gal-meta';
    var nameEl = document.createElement('div');
    nameEl.className = 'gal-name';
    nameEl.textContent = item.name;
    var catEl = document.createElement('div');
    catEl.className = 'gal-cat';
    catEl.textContent = CAT[item.cat] || item.cat;
    meta.appendChild(nameEl);
    meta.appendChild(catEl);
    d.appendChild(media);
    d.appendChild(meta);
    g.appendChild(d);
  });
}

window.openM = function(url, type) {
  var c = document.getElementById('modal-cnt');
  c.innerHTML = '';
  var el;
  if (type === 'video') {
    el = document.createElement('video');
    el.src = url;
    el.controls = true;
    el.autoplay = true;
    el.style.cssText = 'max-width:85vw;max-height:85vh;border-radius:8px;display:block;';
  } else {
    el = document.createElement('img');
    el.src = url;
    el.style.cssText = 'max-width:88vw;max-height:88vh;border-radius:8px;display:block;';
  }
  c.appendChild(el);
  document.getElementById('modal').classList.add('open');
};

window.closeModal = function() {
  document.getElementById('modal').classList.remove('open');
  document.getElementById('modal-cnt').innerHTML = '';
};

</script>
